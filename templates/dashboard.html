<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Templo Fitness</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* USAMOS TUS MISMOS ESTILOS */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Anton', sans-serif; text-transform: uppercase; font-style: italic; letter-spacing: 1px; }
        .bg-industrial { background-image: radial-gradient(#1a1a1a 1px, transparent 1px); background-size: 30px 30px; min-height: 100vh; }
        .container { max-width: 1000px; margin: auto; padding: 60px 25px; }
        
        .panel-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 40px; }
        .tarjeta-socio { background-color: #050505; border: 1px solid #1a1a1a; padding: 40px; }
        
        .rutina-lista { margin-top: 20px; border-top: 1px solid #1a1a1a; }
        .ejercicio { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #1a1a1a; font-size: 14px; }
        .texto-gris { color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body class="bg-industrial">
    <div class="container">
        <header style="border-bottom: 1px solid #1a1a1a; padding-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <p class="texto-gris">Bienvenido</p>
                <h1 style="font-size: 50px;">{{ socio.nombre }}</h1>
            </div>
            <div style="text-align: right;">
                <p class="texto-gris">Plan Actual</p>
                <h3 style="color: #ffffff;">{{ socio.plan }}</h3>
            </div>
        </header>

        <div class="panel-info">
            <div class="tarjeta-socio">
                <p class="texto-gris">Vencimiento</p>
                <h2 style="font-size: 32px; margin-top: 10px;">{{ socio.vence }}</h2>
                <p style="color: #22c55e; font-size: 12px; margin-top: 10px; font-weight: 700;">● CUOTA AL DÍA</p>
            </div>

            <div class="tarjeta-socio" style="grid-column: span 1;">
                <p class="texto-gris">Tu Rutina</p>
                <div class="rutina-lista">
                    {% for item in socio.rutina %}
                    <div class="ejercicio">
                        <span style="font-weight: 700; font-style: italic;">{{ item.ej }}</span>
                        <span style="color: #94a3b8;">{{ item.sets }}</span>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>

        <footer style="margin-top: 60px;">
            <a href="/" style="color: #475569; text-decoration: none; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700;">Cerrar Sesión</a>
        </footer>
    </div>
</body>
</html>
