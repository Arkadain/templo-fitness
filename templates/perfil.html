<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }</style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <header class="mb-10 flex items-center justify-between">
            <a href="/dashboard/{{ socio.dni }}" class="text-[10px] uppercase tracking-widest text-zinc-500 hover:text-white transition-all">← Volver al Inicio</a>
            <h1 style="font-family: 'Anton';" class="text-4xl italic uppercase text-white">Perfil</h1>
        </header>

        <div class="bg-zinc-950 border border-zinc-900 p-10 shadow-2xl mb-6 text-center">
            <div class="w-24 h-24 bg-black border border-zinc-800 rounded-full mx-auto mb-6 flex items-center justify-center text-4xl shadow-inner">
                👤
            </div>
            <h2 class="text-2xl font-black italic uppercase text-white">{{ socio.nombre }}</h2>
            <p class="text-[10px] text-zinc-500 tracking-widest uppercase mt-2">Socio N°: {{ socio.dni }}</p>
        </div>

        <div class="p-6 border {% if restan <= 5 %} border-red-900 bg-red-950/20 {% else %} border-zinc-900 bg-zinc-950 {% endif %} flex justify-between items-center shadow-xl">
            <div>
                <p class="text-[10px] uppercase text-zinc-500 tracking-[0.2em] mb-1 font-bold">Estado del Plan</p>
                <p class="text-lg font-black uppercase italic">
                    {% if restan > 0 %} 
                        Vence en <span class="{% if restan <= 5 %} text-red-500 {% else %} text-white {% endif %}">{{ restan }} días</span> 
                    {% else %}
                        <span class="text-red-500 underline decoration-red-900 decoration-4">Membresía Vencida</span> 
                    {% endif %}
                </p>
            </div>
            <div class="text-right">
                <p class="text-[10px] uppercase text-zinc-600 font-bold tracking-widest">{{ socio.plan }}</p>
                <p class="text-[10px] text-zinc-500 mt-1">{{ socio.vence }}</p>
            </div>
        </div>
        
        <div class="mt-10 text-center">
            <p class="text-[9px] uppercase text-zinc-600 tracking-[0.3em]">Templo Fitness App v2.0</p>
        </div>
    </div>
</body>
</html>
