<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }</style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <header class="mb-10 flex items-center justify-between">
            <a href="/dashboard/{{ socio.dni }}" class="text-[10px] uppercase tracking-widest text-zinc-500 hover:text-white transition-all">← Volver al Inicio</a>
            <h1 style="font-family: 'Anton';" class="text-4xl italic uppercase text-white">{{ dia }}</h1>
        </header>

        <div class="bg-zinc-950 border border-zinc-900 p-8 shadow-2xl border-l-4 border-l-white">
            {% if rutina_hoy and rutina_hoy.strip() %}
            <p class="text-zinc-300 font-mono leading-relaxed whitespace-pre-wrap">{{ rutina_hoy }}</p>
            {% else %}
            <div class="text-center py-10 border border-dashed border-zinc-800">
                <p class="text-zinc-600 italic uppercase text-[10px] tracking-widest">Hoy es día de descanso</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
