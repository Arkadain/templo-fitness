<form method="POST" class="space-y-6 bg-zinc-950 p-8 border border-zinc-900 shadow-2xl">
    <div class="border-t border-zinc-900 pt-6">
        <h3 class="text-white font-black uppercase italic mb-4">Rutina de hoy ({{ dia }})</h3>
        
        {% for i in range(1, 4) %}
        <div class="grid grid-cols-2 gap-4 mb-4">
            <input type="text" name="ej{{i}}" placeholder="Ejercicio {{i}}" 
                   value="{{ socio.rutina[dia][i-1].ej if socio.rutina[dia] and socio.rutina[dia]|length >= i else '' }}"
                   class="bg-black border border-zinc-800 p-2 text-white text-sm">
            <input type="text" name="sets{{i}}" placeholder="Sets (ej: 4x10)" 
                   value="{{ socio.rutina[dia][i-1].sets if socio.rutina[dia] and socio.rutina[dia]|length >= i else '' }}"
                   class="bg-black border border-zinc-800 p-2 text-white text-sm">
        </div>
        {% endfor %}
    </div>

    <button type="submit" class="w-full bg-white text-black font-black py-4 uppercase text-xs tracking-widest">
        Guardar Cambios
    </button>
</form>
