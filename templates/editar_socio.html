<form method="POST" class="space-y-6 bg-zinc-950 p-8 border border-zinc-900 shadow-2xl">
    <h1 class="text-2xl font-black italic uppercase italic">Editar: {{ socio.nombre }}</h1>
    
    <div class="grid grid-cols-2 gap-4">
        <input type="text" name="nombre" value="{{ socio.nombre }}" class="bg-black border border-zinc-800 p-3 text-white">
        <input type="text" name="plan" value="{{ socio.plan }}" class="bg-black border border-zinc-800 p-3 text-white">
        <input type="text" name="vence" value="{{ socio.vence }}" class="bg-black border border-zinc-800 p-3 text-white col-span-2">
    </div>

    <div class="border-t border-zinc-900 pt-6 space-y-4">
        <h3 class="text-zinc-500 text-[10px] uppercase tracking-widest">Rutinas Semanales</h3>
        <div>
            <label class="text-[10px] text-zinc-600 uppercase">Lunes</label>
            <textarea name="rutina_lunes" class="w-full bg-black border border-zinc-800 p-2 text-sm text-zinc-300">{{ socio.rutina_lunes }}</textarea>
        </div>
        <div>
            <label class="text-[10px] text-zinc-600 uppercase">Viernes</label>
            <textarea name="rutina_viernes" class="w-full bg-black border border-zinc-800 p-2 text-sm text-zinc-300">{{ socio.rutina_viernes }}</textarea>
        </div>
        </div>

    <button type="submit" class="w-full bg-white text-black font-black py-4 uppercase">Guardar Todo</button>
</form>
