<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        h1 { font-family: 'Anton', sans-serif; font-style: italic; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-md mx-auto">
        <header class="mb-10">
            <h1 class="text-4xl tracking-tighter uppercase text-white">Editar <span class="text-zinc-600">Socio</span></h1>
            <p class="text-[10px] text-zinc-500 uppercase tracking-[0.3em] mt-2">DNI: {{ id }}</p>
        </header>
        
        <form method="POST" class="space-y-6 bg-zinc-950 p-8 border border-zinc-900 shadow-2xl">
            <div>
                <label class="text-[10px] uppercase tracking-widest text-zinc-500 block mb-2">Nombre Completo</label>
                <input type="text" name="nombre" value="{{ socio.nombre }}" required class="w-full bg-black border border-zinc-800 p-3 outline-none focus:border-white text-white italic font-bold">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-zinc-500 block mb-2">Plan Actual</label>
                    <input type="text" name="plan" value="{{ socio.plan }}" class="w-full bg-black border border-zinc-800 p-3 outline-none focus:border-white text-white">
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-zinc-500 block mb-2">Vencimiento</label>
                    <input type="text" name="vence" value="{{ socio.vence }}" class="w-full bg-black border border-zinc-800 p-3 outline-none focus:border-white text-white">
                </div>
            </div>
            
            <div class="pt-4 flex flex-col gap-3">
                <button type="submit" class="w-full bg-white text-black font-black py-4 uppercase text-xs tracking-widest hover:bg-zinc-300 transition-all">
                    Guardar Cambios
                </button>
                <a href="/admin" class="w-full border border-zinc-800 text-zinc-500 text-center py-4 uppercase text-xs tracking-widest hover:text-white transition-all">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</body>
</html>
