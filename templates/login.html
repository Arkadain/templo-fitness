<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;900&display=swap" rel="stylesheet">
</head>
<body class="bg-black text-white h-screen flex items-center justify-center font-sans">
    <div class="max-w-md w-full p-10 border border-zinc-900 bg-zinc-950">
        <h1 style="font-family: 'Anton';" class="text-4xl italic text-center mb-8 uppercase italic">Acceso <span class="text-zinc-600">Socios</span></h1>
        
        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="text-[10px] uppercase tracking-[0.2em] text-zinc-500 block mb-2">Ingresá tu DNI</label>
                <input type="text" name="dni" required class="w-full bg-black border border-zinc-800 p-4 outline-none focus:border-white text-white">
            </div>
            {% if error %}
                <p class="text-red-500 text-xs uppercase font-bold">{{ error }}</p>
            {% endif %}
            <button type="submit" class="w-full bg-white text-black font-black py-4 uppercase text-xs tracking-widest hover:bg-zinc-300 transition">
                Entrar al Templo
            </button>
        </form>
        <div class="mt-8 text-center">
            <a href="/" class="text-[10px] uppercase text-zinc-600 hover:text-white transition">Volver al inicio</a>
        </div>
    </div>
</body>
</html>
