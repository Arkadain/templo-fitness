<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Acceso | Tu Gimnasio</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lexend:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "templo-black": "#050505",
                        "templo-dark": "#0a0a0a",
                        "templo-gray": "#1a1a1a",
                        "templo-border": "#262626",
                    },
                    fontFamily: {
                        headline: ["Lexend", "sans-serif"],
                        body: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-templo-black text-white font-body antialiased min-h-screen overflow-hidden selection:bg-white selection:text-black">

    <div class="flex min-h-screen w-full">
        
        <!-- Panel Izquierdo: Imagen Inmersiva (Solo Desktop) -->
        <div class="hidden lg:flex lg:w-1/2 relative bg-black items-center justify-center overflow-hidden">
            <!-- Imagen de fondo -->
            <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop" 
                 alt="Tu Gimnasio" 
                 class="absolute inset-0 w-full h-full object-cover opacity-40 grayscale mix-blend-luminosity scale-105">
            
            <!-- Gradiente para fusionar con el panel derecho -->
            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-templo-black/50 to-templo-black"></div>
            
            <!-- Texto motivacional opcional flotante -->
            <div class="absolute bottom-12 left-12 z-10 max-w-md">
                <p class="font-headline font-black italic text-5xl uppercase tracking-tighter text-white/90 leading-[0.9]">
                    Forjá<br>Tu Destino
                </p>
                <div class="h-1 w-12 bg-white mt-6"></div>
            </div>
        </div>

        <!-- Panel Derecho: Formulario de Acceso -->
        <div class="w-full lg:w-1/2 flex flex-col justify-center items-center p-8 sm:p-12 lg:p-24 relative bg-templo-black">
            
            <!-- Botón Volver -->
            <a href="/" class="absolute top-8 left-8 sm:top-12 sm:left-12 flex items-center gap-2 text-zinc-500 hover:text-white transition-colors duration-300 font-headline text-xs font-bold uppercase tracking-widest group">
                <span class="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform">arrow_back</span>
                Inicio
            </a>

            <div class="w-full max-w-sm">
                <!-- Encabezado del Formulario -->
                <div class="mb-12">
                    <h1 class="font-headline font-black italic text-4xl sm:text-5xl uppercase tracking-tighter text-white mb-2">
                        Tu Gimnasio
                    </h1>
                    <p class="text-zinc-400 font-headline text-xs font-bold uppercase tracking-[0.2em]">
                        Portal de Atletas
                    </p>
                </div>

                <!-- Formulario -->
                <form action="/login" method="POST" class="space-y-8">
                    <!-- Token CSRF -->
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <!-- Campo DNI -->
                    <div class="relative group">
                        <label for="dni" class="block text-[10px] font-headline font-bold uppercase tracking-widest text-zinc-500 mb-2 transition-colors group-focus-within:text-white">
                            DNI
                        </label>
                        <input type="text" id="dni" name="dni" required placeholder="Ingresá tu DNI"
                               class="w-full bg-transparent border-0 border-b-2 border-templo-border py-3 px-0 text-white font-body text-lg placeholder-zinc-700 focus:ring-0 focus:border-white focus:outline-none transition-colors duration-300">
                    </div>

                    <!-- Campo Contraseña -->
                    <div class="relative group">
                        <label for="password" class="block text-[10px] font-headline font-bold uppercase tracking-widest text-zinc-500 mb-2 transition-colors group-focus-within:text-white">
                            Contraseña
                        </label>
                        <input type="password" id="password" name="password" required placeholder="••••••••"
                               class="w-full bg-transparent border-0 border-b-2 border-templo-border py-3 px-0 text-white font-body text-lg placeholder-zinc-700 focus:ring-0 focus:border-white focus:outline-none transition-colors duration-300">
                    </div>

                    <!-- Mensaje de Error (Jinja2) -->
                    {% if error %}
                    <div class="bg-red-950/30 border border-red-900/50 p-4 flex items-center gap-3">
                        <span class="material-symbols-outlined text-red-500 text-sm">warning</span>
                        <p class="text-red-500 font-headline text-[10px] font-bold uppercase tracking-widest">
                            {{ error }}
                        </p>
                    </div>
                    {% endif %}

                    <!-- Botón de Submit -->
                    <div class="pt-4">
                        <button type="submit" class="w-full bg-white text-black font-headline font-black italic text-sm uppercase tracking-[0.2em] py-5 hover:bg-zinc-200 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3 group">
                            Entrar al Gimnasio
                            <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
                        </button>
                    </div>
                </form>

                <!-- Pie del formulario -->
                <div class="mt-12 pt-8 border-t border-templo-border text-center">
                    <p class="text-[10px] font-body text-zinc-600 uppercase tracking-widest">
                        Acceso exclusivo para miembros registrados
                    </p>
                </div>
            </div>
        </div>
        
    </div>

</body>
</html>
